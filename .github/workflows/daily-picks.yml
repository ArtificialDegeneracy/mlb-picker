name: MLB Daily Picks

on:
  schedule:
    # All times in UTC (ET + 4 during DST)
    - cron: '0 12 * * *'   # 8 AM ET — morning picks
    - cron: '0 15 * * *'   # 11 AM ET — lineup lock 1
    - cron: '0 18 * * *'   # 2 PM ET — lineup lock 2
    - cron: '0 21 * * *'   # 5 PM ET — lineup lock 3
    - cron: '0 0 * * *'    # 8 PM ET — lineup lock 4
    - cron: '0 5 * * *'    # 1 AM ET — results
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - lineup_lock
          - results
      date:
        description: 'Date override (YYYY-MM-DD, leave empty for today/yesterday)'
        required: false
        default: ''
      force_seed:
        description: 'Skip artifact restore and use seed/ DB+model (deploy mechanism)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database and model
        run: |
          if [ "${{ inputs.force_seed }}" = "true" ]; then
            echo "force_seed=true — skipping artifact restore, will fall back to seed/"
          else
            # Download artifacts from previous run if they exist
            # gh run download extracts into a subdirectory named after the artifact
            gh run download --name mlb-picker-db --dir /tmp/db-restore 2>/dev/null && \
              cp /tmp/db-restore/mlb_picker.db . 2>/dev/null && \
              echo "DB restored" || echo "No previous DB found"

            if gh run download --name mlb-picker-model --dir /tmp/model-restore 2>/dev/null; then
              echo "Model artifact downloaded. Contents:"
              find /tmp/model-restore -type f
              find /tmp/model-restore -name "trained_model.pkl" -exec cp {} model/ \;
              find /tmp/model-restore -name "scaler.pkl" -exec cp {} model/ \;
              echo "Model restored"
            else
              echo "No previous model found"
            fi
          fi

          echo "--- File check ---"
          ls -la mlb_picker.db 2>/dev/null || echo "  mlb_picker.db: MISSING"
          ls -la model/trained_model.pkl 2>/dev/null || echo "  trained_model.pkl: MISSING"
          ls -la model/scaler.pkl 2>/dev/null || echo "  scaler.pkl: MISSING"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize (first run only)
        run: |
          # Use seed files if artifacts weren't restored
          if [ ! -f mlb_picker.db ] && [ -f seed/mlb_picker.db ]; then
            echo "Using seed database"
            cp seed/mlb_picker.db .
          fi
          if [ ! -f model/trained_model.pkl ] && [ -f seed/trained_model.pkl ]; then
            echo "Using seed model"
            cp seed/trained_model.pkl model/
            cp seed/scaler.pkl model/
          fi

          if [ ! -f mlb_picker.db ] || [ ! -f model/trained_model.pkl ]; then
            echo "Database or model missing — running init..."
            python main.py init
          else
            echo "Database and model ready, skipping init"
          fi

      - name: Migrate database schema
        run: |
          if [ -f mlb_picker.db ]; then
            python3 migrate.py mlb_picker.db
          fi

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "0 12 * * *") echo "mode=morning" >> $GITHUB_OUTPUT ;;
              "0 5 * * *")  echo "mode=results" >> $GITHUB_OUTPUT ;;
              *)            echo "mode=lineup_lock" >> $GITHUB_OUTPUT ;;
            esac
            if [ -f mlb_picker.db ]; then
              TODAY=$(date -u +%Y-%m-%d)
              COUNT=$(python3 -c "import sqlite3; c=sqlite3.connect('mlb_picker.db'); print(c.execute(\"SELECT COUNT(*) FROM picks WHERE pick_date='$TODAY' AND run_type='morning'\").fetchone()[0]); c.close()" 2>/dev/null || echo "0")
              if [ "$COUNT" = "0" ]; then
                echo "No morning picks for today — overriding to morning mode"
                echo "mode=morning" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Run scheduler
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          python scheduler.py ${{ steps.mode.outputs.mode }} $DATE_ARG

      # --- Champion/challenger shadow testing -------------------------------
      # The XGBoost challenger runs ALONGSIDE production. It writes only to the
      # shadow_picks table; the production `picks` table is never touched.
      # continue-on-error: a challenger failure is logged but NEVER fails the
      # job — production picks must always complete. See model/shadow.py.

      - name: Shadow predict (challenger, morning run only)
        if: steps.mode.outputs.mode == 'morning'
        continue-on-error: true
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          python -m model.shadow predict $DATE_ARG

      - name: Shadow score (challenger, results run only)
        if: steps.mode.outputs.mode == 'results'
        continue-on-error: true
        run: |
          # results mode scores YESTERDAY's games — score the shadow picks for
          # the same date. Honors the manual date override if given.
          if [ -n "${{ inputs.date }}" ]; then
            SHADOW_DATE="${{ inputs.date }}"
          else
            SHADOW_DATE=$(date -u -d "yesterday" +%Y-%m-%d 2>/dev/null \
              || date -u -v-1d +%Y-%m-%d)
          fi
          python -m model.shadow score --date "$SHADOW_DATE"
          echo "--- champion vs challenger so far ---"
          python -m model.shadow report || true

      - name: Regenerate dashboard for today
        run: python -c "from output.dashboard import generate_dashboard; from datetime import datetime; generate_dashboard(datetime.now().strftime('%Y-%m-%d'))"

      # --- balldontlie ingest + Goose dashboard -----------------------------
      # The ingest pulls today's odds, arsenals, batting, form, and injuries
      # into the bdl_*_today cache tables. GOAT-tier (600 req/min) makes the
      # full daily ingest ~1 minute synchronous. continue-on-error so a
      # balldontlie outage NEVER fails the cron — production picks are written
      # above; the Goose dashboard is supplementary until the soak completes.

      - name: Ingest balldontlie data
        if: steps.mode.outputs.mode != 'results'
        continue-on-error: true
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          # Crosswalk runs on morning only — rosters change rarely; nightly is
          # plenty. Lineup-lock crons just refresh the per-day snapshots.
          if [ "${{ steps.mode.outputs.mode }}" = "morning" ]; then
            python -m data.balldontlie crosswalk
          fi
          python -m data.balldontlie ingest $DATE_ARG

      - name: Regenerate Goose dashboard
        continue-on-error: true
        run: |
          DATE_ARG=""
          if [ -n "${{ inputs.date }}" ]; then
            DATE_ARG="--date ${{ inputs.date }}"
          fi
          # results mode regenerates with whichever date the production
          # dashboard used (today's run picks up newly-graded picks for the
          # Season Tracker tab).
          python output/goose_dashboard.py $DATE_ARG

      - name: Save database artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-picker-db
          path: mlb_picker.db
          retention-days: 90
          overwrite: true

      - name: Save model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlb-picker-model
          path: |
            model/trained_model.pkl
            model/scaler.pkl
          retention-days: 90
          overwrite: true

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp output/mlb_picks.html _site/index.html
          # Goose dashboard — soak alongside the existing dashboard. Lives at
          # /goose.html so the existing URL is unchanged. Promote to index.html
          # after the ~1 week soak period.
          if [ -f output/goose_dashboard.html ]; then
            cp output/goose_dashboard.html _site/goose.html
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-dashboard:
    needs: run-picks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
